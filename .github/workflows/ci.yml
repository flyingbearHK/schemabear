name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Prefer Node 24 for JS-based actions during the Node 20 deprecation window.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
          - os: windows-latest
          - os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # Tauri Linux system deps (Ubuntu 22.04+).
      # Use ayatana tray only — libappindicator3-dev conflicts with it.
      - name: Install Linux WebKit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: er-core tests
        run: cargo test --manifest-path crates/er-core/Cargo.toml

      - name: Frontend build
        run: npm run build

      - name: Tauri check
        run: cargo check --manifest-path src-tauri/Cargo.toml

  build-macos:
    name: build macOS arm64
    needs: check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Tauri build (macOS)
        run: npm run tauri:build:mac
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: schemabear-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  build-windows:
    name: build Windows x64
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Tauri build (Windows)
        run: npm run tauri:build:win
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: schemabear-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
