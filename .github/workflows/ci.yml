name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install frontend deps
        run: npm ci
      - name: er-core tests
        run: cargo test --manifest-path crates/er-core/Cargo.toml
      - name: Frontend build
        run: npm run build
      - name: Tauri check
        run: cargo check --manifest-path src-tauri/Cargo.toml
